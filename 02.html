<style>

.container {

  display: flex;

  flex-direction: column;

  padding: $padding;

  gap: $gap;

}

[class ^="block-"]{

  display: flex;

  flex-direction: row;

  gap: $gap;

  

// Removing Padding, Gap & divide by 3

  height: (100vh -$gap*2 -$padding*2)/3;

  

// Style Rules for Mobile Version  

  @include query(mobile){

    flex-direction: column;

  }

}

[class ^="box-"]{

// To place the letter at center

  display: flex;

  justify-content: center;

  align-items: center;

  

// Border, Border-radius & background-color

  border : 1vh solid $color;

  border-radius: 10px;

  background-color: #c1c1c1;

}

//A

.box-1{

  flex-basis: 100%;

}

//B & D

.box-2, .box-5{

  flex-basis: 70%;

}

//E  & C

.box-3,.box-4{

  flex-basis: 30%

}

// Style Rules for Mobile Version 

@include query(mobile){

  .block-2{

    height: (100vh*2)/3; // 66.66vh

  }

  .block-3{

    flex-direction: row;

  }

  

//   Selecting B, E, C, D

  .box-2,.box-3,.box-4,.box-5{

    flex-basis: 50%;

  }

}

</style>

<div class="container">

    

  <div class="block-1">

    <div class="box-1"> A </div>

  </div>

    

    

  <div class="block-2">

    <div class="box-2"> B </div>

    <div class="box-3"> E </div>

  </div>

    

    

  <div class="block-3">

    <div class="box-4"> C </div>

    <div class="box-5"> D </div>

  </div>

    

</div>

</div>

</script>
